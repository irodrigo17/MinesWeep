name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('**/*.swift', '**/*.pbxproj') }}
          restore-keys: deriveddata-${{ runner.os }}-

      - name: Resolve simulator
        id: sim
        run: |
          DEST=$(xcodebuild -project Minesweep.xcodeproj -scheme Minesweep -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' | grep 'iPhone' | head -1 \
            | sed 's/.*{ //' | sed 's/ }$//')
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          xcodebuild -project Minesweep.xcodeproj \
            -scheme Minesweep \
            -destination '${{ steps.sim.outputs.destination }}' \
            -only-testing:MinesweepTests \
            -resultBundlePath TestResults \
            test
